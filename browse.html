<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Creative Commons Digital Asset Finder</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Creative Commons Asset Finder</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="browse.html">Search</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5 page-content">

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h1 class="mb-3 text-center">Search Wikimedia Commons</h1>
        <p class="text-center">
          Search Wikimedia Commons for images, audio, and video. Each asset includes structured metadata.
        </p>
      </div>
    </div>

    <div class="row justify-content-center mb-4">
      <div class="col-md-6">
        <form id="searchForm" class="input-group">
          <input id="q" type="text" class="form-control" placeholder="Try: library, mural..." required>
          <button class="btn btn-primary" type="submit">Search</button>
        </form>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-8 text-center">
        <div id="status" class="mb-3" aria-live="polite"></div>
      </div>
    </div>

    <div class="row g-4" id="results" aria-live="polite"></div>

    <div class="row mt-4">
      <div class="col text-center">
        <div id="pageIndicator" class="mb-3 fw-semibold" hidden>Page 1</div>

        <nav id="paginationNav" aria-label="Search results pages" hidden>
          <ul id="pagination" class="pagination justify-content-center flex-wrap"></ul>
        </nav>
      </div>
    </div>

  </main>

  <footer class="bg-light text-center mt-5 py-3">
    <small>© 2026 Thomas Macaluso. All rights reserved.</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById("searchForm");
    const resultsEl = document.getElementById("results");
    const statusEl = document.getElementById("status");
    const pageIndicator = document.getElementById("pageIndicator");
    const paginationNav = document.getElementById("paginationNav");
    const paginationEl = document.getElementById("pagination");

    let currentPage = 1;
    let totalPages = 1;
    let currentResults = [];

    const RESULTS_PER_PAGE =12;
    const MAX_FETCH_RESULTS = 250;

    function stripHtml(html) {
      if (!html) return "";
      const div = document.createElement("div");
      div.innerHTML = html;
      return (div.textContent || div.innerText || "").trim();
    }

    function getExt(meta, key) {
      return meta && meta[key] ? stripHtml(meta[key].value) : "";
    }

    function safeText(s) {
      return (s || "").replace(/\s+/g, " ").trim();
    }

    function safeHtml(s) {
      return (s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function searchCommons(query) {
      const endpoint = "https://commons.wikimedia.org/w/api.php";
      const url = new URL(endpoint);

      url.searchParams.set("origin", "*");
      url.searchParams.set("format", "json");
      url.searchParams.set("action", "query");
      url.searchParams.set("generator", "search");
      url.searchParams.set("gsrsearch", query);
      url.searchParams.set("gsrnamespace", "6");
      url.searchParams.set("gsrlimit", String(MAX_FETCH_RESULTS));
      url.searchParams.set("prop", "imageinfo|categories|info");
      url.searchParams.set("iiprop", "url|extmetadata|mime|size");
      url.searchParams.set("iiurlwidth", "520");
      url.searchParams.set("cllimit", "10");
      url.searchParams.set("inprop", "url");

      const resp = await fetch(url.toString());
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      return resp.json();
    }

    function isRenderableAsset(page) {
      if (!page || !page.imageinfo || !page.imageinfo[0]) return false;

      const info = page.imageinfo[0];
      const mime = (info.mime || "").toLowerCase();
      const mediaUrl = info.url || "";
      const thumbUrl = info.thumburl || "";

      if (mime.startsWith("audio/")) {
        return !!mediaUrl;
      }

      if (mime.startsWith("video/")) {
        return !!mediaUrl;
      }

      if (mime.startsWith("image/")) {
        return !!(thumbUrl || mediaUrl);
      }

      return false;
    }


    function renderMediaElement(info, title) {

      const mimeType = (info.mime || "").toLowerCase();
      const mediaUrl = info.url || "";
      const thumbUrl = info.thumburl || mediaUrl || "";
      const safeTitle = safeHtml(title || "Media asset");

      if (mimeType.startsWith("audio/")) {
        return `
          <div class="p-3">
            <audio controls style="width:100%">
              <source src="${mediaUrl}" type="${mimeType}">
            </audio>
          </div>
        `;
      }

      if (mimeType.startsWith("video/")) {
        return `
          <video controls class="card-img-top asset-thumb">
            <source src="${mediaUrl}" type="${mimeType}">
          </video>
        `;
      }

      return `<img src="${thumbUrl}" class="card-img-top asset-thumb" alt="${safeTitle}">`;
    }

    function buildMetadataRows(data) {
      const rows = [
        ["Title", data.title],
        ["Creator", data.creator],
        ["Contributor / Credit", data.credit],
        ["Description", data.description],
        ["Date", data.date],
        ["Type", data.type],
        ["Format", data.format],
        ["Publisher / Repository", data.publisher],
        ["Source", data.source],
        ["Identifier", data.identifier],
        ["Language", data.language],
        ["Relation", data.relation],
        ["Coverage", data.coverage],
        ["Subject", data.subject],
        ["Rights", data.rights],
        ["License URL", data.licenseUrl],
        ["Original Asset Page", data.assetPage]
      ];

      return rows
        .filter(([, value]) => value && value !== "Not listed")
        .map(([label, value]) => {
          const isUrl = /^https?:\/\//i.test(value);
          return `
            <div class="mb-2">
              <strong>${safeHtml(label)}:</strong>
              ${
                isUrl
                  ? `<a href="${value}" target="_blank" rel="noopener noreferrer">${safeHtml(value)}</a>`
                  : safeHtml(value)
              }
            </div>
          `;
        })
        .join("");
    }

    function getPageResults(page) {
      const start = (page - 1) * RESULTS_PER_PAGE;
      const end = start + RESULTS_PER_PAGE;
      return currentResults.slice(start, end);
    }

    function renderResultsForPage(page) {
      resultsEl.innerHTML = "";

      const pageResults = getPageResults(page);

      if (pageResults.length === 0) {
        statusEl.textContent = "No results found.";
        pageIndicator.hidden = true;
        paginationNav.hidden = true;
        return;
      }

      const startNum = ((page - 1) * RESULTS_PER_PAGE) + 1;
      const endNum = startNum + pageResults.length - 1;

      statusEl.textContent = `Showing ${startNum}-${endNum} of ${currentResults.length} results`;
      pageIndicator.hidden = false;
      pageIndicator.textContent = `Page ${page} of ${totalPages}`;

      for (const p of pageResults) {
        const info = p.imageinfo[0];
        const meta = info.extmetadata || {};
        const categories = (p.categories || []).map(c =>
          safeText(c.title.replace(/^Category:/, ""))
        );

        const fileName = safeText(p.title || "")
          .replace(/^File:/, "")
          .replace(/\.[^/.]+$/, "")
          .replace(/_/g, " ");

        const title =
          safeText(getExt(meta, "ObjectName")) ||
          safeText(getExt(meta, "ImageDescription")) ||
          fileName;

        const creator = safeText(getExt(meta, "Artist")) || "Not listed";
        const credit = safeText(getExt(meta, "Credit")) || "Not listed";
        const description = safeText(getExt(meta, "ImageDescription")) || "Not listed";

        const date =
          safeText(getExt(meta, "DateTimeOriginal")) ||
          safeText(getExt(meta, "DateTime")) ||
          "Not listed";

        const licenseShort = safeText(getExt(meta, "LicenseShortName")) || "Not listed";
        const licenseUrl = safeText(getExt(meta, "LicenseUrl")) || "";
        const usageTerms = safeText(getExt(meta, "UsageTerms")) || "";
        const attributionRequired = safeText(getExt(meta, "AttributionRequired")) || "";
        const mimeType = safeText(info.mime) || "Not listed";
        const objectName = safeText(getExt(meta, "ObjectName")) || "";
        const language = safeText(getExt(meta, "Language")) || "Not listed";
        const assetPage = safeText(p.fullurl) || "";

        const subject = categories.length ? categories.join(", ") : "Not listed";

        const type = mimeType.startsWith("image/")
          ? "Image"
          : mimeType.startsWith("audio/")
          ? "Audio"
          : mimeType.startsWith("video/")
          ? "Video"
          : "Media";

        const format = mimeType;
        const publisher = "Wikimedia Commons";
        const source = "Wikimedia Commons";
        const identifier = p.pageid ? String(p.pageid) : "Not listed";
        const relation = objectName || "Not listed";
        const coverage = "Not listed";
        const rights = usageTerms || licenseShort || "Not listed";

        const metadataHtml = buildMetadataRows({
          title,
          creator,
          credit,
          description,
          date,
          type,
          format,
          publisher,
          source,
          identifier,
          language,
          relation,
          coverage,
          subject,
          rights,
          licenseUrl,
          assetPage
        });

        const col = document.createElement("div");
        col.className = "col-md-6 col-lg-4";

        col.innerHTML = `
          <div class="card h-100 shadow-sm">
            ${renderMediaElement(info, title)}

            <div class="card-body d-flex flex-column">
              <h6 class="card-title mb-3">${safeHtml(title || "Untitled file")}</h6>

              <details class="mt-auto metadata-details">
                <summary class="btn btn-sm btn-outline-dark">View metadata</summary>
                <div class="metadata-panel mt-3 small">
                  ${metadataHtml}
                  ${
                    attributionRequired
                      ? `<div class="mb-2"><strong>Attribution Required:</strong> ${safeHtml(attributionRequired)}</div>`
                      : ""
                  }
                </div>
              </details>
            </div>
          </div>
        `;

        resultsEl.appendChild(col);
      }
    }

    function createPageItem(label, page, disabled = false, active = false) {
      const li = document.createElement("li");
      li.className = `page-item${disabled ? " disabled" : ""}${active ? " active" : ""}`;

      const button = document.createElement("button");
      button.className = "page-link";
      button.type = "button";
      button.textContent = label;

      if (!disabled && !active) {
        button.addEventListener("click", () => {
          goToPage(page);
        });
      }

      li.appendChild(button);
      return li;
    }

    function renderPagination() {
      paginationEl.innerHTML = "";

      if (!currentResults.length || totalPages <= 1) {
        paginationNav.hidden = true;
        return;
      }

      paginationNav.hidden = false;

      paginationEl.appendChild(
        createPageItem("Previous", currentPage - 1, currentPage === 1, false)
      );

      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, currentPage + 2);

      if (currentPage <= 3) {
        endPage = Math.min(totalPages, 5);
      }

      if (currentPage >= totalPages - 2) {
        startPage = Math.max(1, totalPages - 4);
      }

      if (startPage > 1) {
        paginationEl.appendChild(createPageItem("1", 1, false, currentPage === 1));

        if (startPage > 2) {
          const ellipsis = document.createElement("li");
          ellipsis.className = "page-item disabled";
          ellipsis.innerHTML = `<span class="page-link">…</span>`;
          paginationEl.appendChild(ellipsis);
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        paginationEl.appendChild(
          createPageItem(String(i), i, false, i === currentPage)
        );
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          const ellipsis = document.createElement("li");
          ellipsis.className = "page-item disabled";
          ellipsis.innerHTML = `<span class="page-link">…</span>`;
          paginationEl.appendChild(ellipsis);
        }

        paginationEl.appendChild(
          createPageItem(String(totalPages), totalPages, false, currentPage === totalPages)
        );
      }

      paginationEl.appendChild(
        createPageItem("Next", currentPage + 1, currentPage === totalPages, false)
      );
    }

    function goToPage(page) {
      if (page < 1 || page > totalPages) return;

      currentPage = page;
      renderResultsForPage(currentPage);
      renderPagination();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const query = document.getElementById("q").value.trim();
      if (!query) return;

      resultsEl.innerHTML = "";
      statusEl.textContent = "Searching...";
      pageIndicator.hidden = true;
      paginationNav.hidden = true;
      paginationEl.innerHTML = "";

      currentPage = 1;
      totalPages = 1;
      currentResults = [];

      try {
        const data = await searchCommons(query);
        const pagesObj = data?.query?.pages;

        if (!pagesObj) {
          statusEl.textContent = "No results found.";
          return;
        }

        currentResults = Object.values(pagesObj)
          .filter(isRenderableAsset);

        if (!currentResults.length) {
          statusEl.textContent = "No usable media assets found.";
          return;
        }

        totalPages = Math.ceil(currentResults.length / RESULTS_PER_PAGE);

        renderResultsForPage(currentPage);
        renderPagination();
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
      }
    });
  </script>

</body>
</html>
